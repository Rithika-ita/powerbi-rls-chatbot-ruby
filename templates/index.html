<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI RLS Chatbot</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- Power BI JavaScript SDK -->
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
</head>
<body>

    <!-- ========================= TOP BAR ========================= -->
    <header class="topbar">
        <h1>
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            Power BI &middot; RLS Chatbot
        </h1>
        <div class="user-selector">
            <label for="userSelect">Simulated User:</label>
            <select id="userSelect">
                <option value="">— Select a user —</option>
                {% for display_name, rls_username in demo_users.items() %}
                <option value="{{ rls_username }}">{{ display_name }}</option>
                {% endfor %}
            </select>
            <span class="user-badge">
                <span class="dot"></span>
                <span id="rlsTag">No user selected</span>
            </span>
        </div>
    </header>

    <!-- ========================= MAIN ========================= -->
    <main class="main-container">

        <!-- Report Panel -->
        <section class="report-panel">
            <div class="panel-header">
                <span>📊 Embedded Report</span>
                <span class="rls-tag" id="rlsTag2">Effective Identity active</span>
            </div>
            <div id="reportContainer">
                <div class="placeholder-msg">
                    <svg viewBox="0 0 24 24"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 7h4v4H7V7zm0 6h4v4H7v-4zm6-6h4v4h-4V7zm0 6h4v4h-4v-4z"/></svg>
                    <p><strong>Select a user above</strong> to load the report with RLS applied.</p>
                </div>
            </div>
        </section>

        <!-- Chat Panel -->
        <section class="chat-panel">
            <div class="panel-header">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                Data Chatbot (RLS-aware)
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="placeholder-msg" style="margin-top:40px;">
                    <p>Select a user to start chatting.</p>
                </div>
            </div>

            <div class="chat-input-bar">
                <input type="text"
                       id="chatInput"
                       placeholder="Ask a question about your data…"
                       autocomplete="off" />
                <button id="sendBtn">
                    Send
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </section>

    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
